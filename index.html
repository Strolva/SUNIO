<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Audio Jigsaw Toy</title>
    <style>
        body { 
            background: #0f172a; color: #38bdf8; font-family: 'Segoe UI', Tahoma, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            min-height: 100vh; margin: 0; 
        }
        h1 { margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px; }
        
        #controls { margin-bottom: 20px; }
        
        button { 
            padding: 12px 24px; background: #38bdf8; color: #0f172a; border: none; 
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: #fff; transform: translateY(-2px); }

        /* The Grid Container */
        #grid-container {
            position: relative;
            padding: 15px;
            background: #1e293b;
            border-radius: 12px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* The faint background waveform */
        #ghost-wave {
            position: absolute;
            top: 15px; left: 15px;
            width: 380px; height: 380px; /* 3 cols of 120px + gaps */
            opacity: 0.15;
            pointer-events: none;
            z-index: 0;
        }

        #grid { 
            display: grid; 
            grid-template-columns: repeat(3, 120px); 
            gap: 10px; 
            position: relative;
            z-index: 1;
        }

        .piece { 
            width: 120px; height: 120px; background: rgba(51, 65, 85, 0.8); 
            cursor: grab; border-radius: 8px; border: 2px solid rgba(255,255,255,0.05);
            transition: transform 0.1s, box-shadow 0.3s;
            overflow: hidden;
        }
        .piece:active { cursor: grabbing; }
        .piece.correct { border-color: #38bdf8; box-shadow: 0 0 15px rgba(56, 189, 248, 0.3); }

        #status { margin-top: 20px; font-weight: bold; height: 20px; }
    </style>
</head>
<body>

    <h1>Audio Jigsaw</h1>
    
    <div id="controls">
        <button id="startBtn" onclick="initAudio()">1. INITIALIZE AUDIO</button>
        <button id="refBtn" onclick="playReference()" style="display:none;">2. LISTEN TO REFERENCE</button>
    </div>

    <div id="grid-container">
        <canvas id="ghost-wave"></canvas>
        <div id="grid"></div>
    </div>

    <p id="status">Click Initialize to start...</p>

   <script>
    let audioCtx, mainBuffer;
    let currentSource = null; // This tracks the active "match"
    let pieces = [0,1,2,3,4,5,6,7,8].sort(() => Math.random() - 0.5);
    const grid = document.getElementById('grid');
    const status = document.getElementById('status');

    async function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        status.innerText = "Loading audio file...";
        
        try {
            const resp = await fetch('./mysound.mp3');
            const data = await resp.arrayBuffer();
            mainBuffer = await audioCtx.decodeAudioData(data);
            
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('refBtn').style.display = 'inline-block';
            status.innerText = "Audio Loaded. Arrange the pieces!";
            
            drawGhostWave();
            render();
        } catch (e) {
            status.innerText = "Error: Cannot find 'mysound.mp3'.";
            console.error(e);
        }
    }

    // THE FIX: Improved Stop function
    function stopCurrentAudio() {
        if (currentSource) {
            try {
                currentSource.stop();
            } catch(e) { 
                // Ignore errors if the sound already ended
            }
            currentSource = null; 
        }
    }

    function playSlice(idx) {
        if (!mainBuffer) return;
        stopCurrentAudio(); // Kill any playing reference or slice

        const source = audioCtx.createBufferSource();
        source.buffer = mainBuffer;
        const dur = mainBuffer.duration / 9;
        
        source.connect(audioCtx.destination);
        source.start(0, idx * dur, dur);
        
        // We don't track slices as currentSource because they are short 1-sec blips
    }

    function playReference() {
        if (!mainBuffer) return;
        
        // If it's already playing, STOP IT
        if (currentSource) {
            stopCurrentAudio();
            status.innerText = "Audio Stopped.";
            return;
        }

        // Otherwise, START IT
        const source = audioCtx.createBufferSource();
        source.buffer = mainBuffer;
        source.connect(audioCtx.destination);
        
        // IMPORTANT: When the song reaches the end, reset the variable
        source.onended = () => {
            currentSource = null;
            status.innerText = "Reference finished.";
        };

        source.start(0);
        currentSource = source; // Now the button "knows" something is playing
        status.innerText = "👂 Playing... (Click again to stop)";
    }

    // ... (Keep drawGhostWave and render functions from previous version) ...
    // Note: Ensure render() calls playSlice(pIdx) on click and drop.
</script>
</body>
</html>
